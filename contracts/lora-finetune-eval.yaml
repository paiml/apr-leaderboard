metadata:
  version: 1.0.0
  created: 2026-04-01
  author: PAIML
  description: >
    End-to-end LoRA fine-tuning evaluation — train on coding data,
    merge adapter, evaluate on HumanEval pass@1.
  references:
    - "Chen et al. (2021) Evaluating Large Language Models Trained on Code"
    - "Dettmers et al. (2023) QLoRA"

equations:
  lora_merge:
    formula: "W_merged = W_base + (α/r) · A @ B"
    domain: "W_base ∈ ℝ^{d_out×d_in}; A ∈ ℝ^{d_out×r}; B ∈ ℝ^{r×d_in}; α, r > 0"
    codomain: "W_merged ∈ ℝ^{d_out×d_in}"
    invariants:
      - "Merged weight shape = base weight shape"
      - "When A=0 or B=0, merged = base (no-op merge)"

  training_loss:
    formula: "L(θ, t) = CE(f_θ(x_t), y_t) averaged over batch"
    domain: "θ = LoRA parameters; t = training step"
    codomain: "L ∈ ℝ≥0"
    invariants:
      - "avg_loss(epoch_N) < avg_loss(epoch_1) for N >= 2"

proof_obligations:
  - type: convergence
    property: "Training loss decreases over epochs"
    formal: "avg_loss(last_epoch) < avg_loss(first_epoch)"

  - type: equivalence
    property: "Adapter merge follows LoRA formula"
    formal: "W_merged = W_base + (α/r) · A @ B"

  - type: bound
    property: "Fine-tuned model maintains baseline quality"
    formal: "pass@1(merged) >= pass@1(base) - 2pp"
    tolerance: 0.02

falsification_tests:
  FALSIFY-EVAL-001:
    obligation: training_convergence
    method: "Train N epochs, verify avg_loss decreases"
    pass_criterion: "avg_loss(last_epoch) < avg_loss(first_epoch)"

  FALSIFY-EVAL-002:
    obligation: adapter_merge
    method: "Export adapter, merge, verify output file is valid .apr"
    pass_criterion: "apr validate merged.apr passes"

  FALSIFY-EVAL-003:
    obligation: eval_parity
    method: "Run HumanEval on merged model, compare to base 85.37%"
    pass_criterion: "pass@1 >= 83%"
