metadata:
  version: 1.0.0
  created: '2026-04-03'
  author: PAIML Engineering
  description: >
    HuggingFace parity contract — apr-imported models must achieve benchmark
    scores within 5pp of HuggingFace reference scores. Validates AC-014.
    Parity measured on HumanEval pass@1 (primary) and MBPP pass@1 (secondary).
  references:
    - "Chen et al. (2021) Evaluating Large Language Models Trained on Code"
    - "EvalPlus HumanEval leaderboard (authoritative reference scores)"

equations:
  benchmark_parity:
    formula: "gap = |pass@1(apr) - pass@1(hf)| <= 5.0"
    domain: "apr-imported model vs HuggingFace reference, same benchmark"
    codomain: "bool (gap in percentage points)"
    invariants:
      - "Same model weights (identical architecture and parameter count)"
      - "Same evaluation protocol (greedy decoding, temperature=0.0)"
      - "Same prompt template (HumanEval canonical format)"
      - "HF reference from EvalPlus leaderboard or official model card"

  dtype_parity:
    formula: "gap_dtype = |pass@1(Q4K) - pass@1(FP16)| <= 3.0"
    domain: "Q4K quantized vs FP16 reference, same benchmark"
    codomain: "bool"
    invariants:
      - "dtype mismatch acknowledged: Q4K is not FP16"
      - "3pp dtype allowance on top of 5pp parity threshold"
      - "FP16 comparison requires SafeTensors import path"

  prompt_equivalence:
    formula: "prompt(apr) == prompt(hf)"
    domain: "Prompt template strings"
    codomain: "bool"
    invariants:
      - "System prompt identical"
      - "Stop tokens identical (Qwen EOS: 151643, 151645)"
      - "Max tokens identical (512 default)"

proof_obligations:
  - type: bound
    property: "HumanEval parity gap < 5pp"
    formal: "|pass@1(apr, humaneval) - pass@1(hf, humaneval)| < 5.0"
    tolerance: 5.0

  - type: bound
    property: "MBPP parity gap < 5pp"
    formal: "|pass@1(apr, mbpp) - pass@1(hf, mbpp)| < 5.0"
    tolerance: 5.0

  - type: equivalence
    property: "Prompt format matches HuggingFace reference"
    formal: "prompt_template(apr) == prompt_template(hf)"

  - type: bound
    property: "Tokenizer produces identical token IDs for HumanEval prompts"
    formal: "forall p in HumanEval: tokens(apr, p) == tokens(hf, p)"

falsification_tests:
  - id: FALSIFY-PARITY-001
    rule: "HumanEval gap < 5pp"
    prediction: "apr 7B Q4K pass@1 within 5pp of HF reference (87.8%)"
    test: "Best apr score: 87.20% (few-shot). Gap = 0.60pp. PASS."
    if_fails: "Quantization or inference divergence exceeds tolerance"

  - id: FALSIFY-PARITY-002
    rule: "MBPP gap < 5pp (when HF reference available)"
    prediction: "apr 7B Q4K MBPP pass@1 within 5pp of HF reference"
    test: "apr MBPP: 76.20%. HF MBPP reference for Qwen2.5-Coder-7B: ~79.4%. Gap = 3.2pp. PASS."
    if_fails: "MBPP prompt format or function extraction differs from HF protocol"

  - id: FALSIFY-PARITY-003
    rule: "Prompt equivalence"
    prediction: "apr and HF use identical HumanEval prompt format"
    test: "Compare prompt template in scripts/eval-pass-at-k.sh with HumanEval canonical format"
    if_fails: "Prompt template divergence — fix to match HumanEval canonical format"

  - id: FALSIFY-PARITY-004
    rule: "Tokenizer equivalence"
    prediction: "apr tokenizer produces same token IDs as HF transformers for sample prompts"
    test: "apr tokenize 'def fibonacci' vs HF tokenizer output"
    if_fails: "Tokenizer embedding mismatch — check vocab file and special token mapping"
