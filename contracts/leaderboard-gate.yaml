metadata:
  version: 1.0.0
  created: '2026-04-03'
  author: PAIML Engineering
  description: >
    Leaderboard submission gate — compound acceptance criterion (AC-022)
    requiring minimum pass@1 thresholds on HumanEval, HumanEval+, and MBPP.
  references:
    - "Chen et al. (2021) Evaluating Large Language Models Trained on Code"
    - "Liu et al. (2023) Is Your Code Generated by ChatGPT Really Correct? (EvalPlus)"

equations:
  pass_at_1_humaneval:
    formula: "pass@1_HE = count(correct) / count(total)"
    domain: "164 HumanEval problems, greedy decoding"
    codomain: "[0, 1]"
    invariants:
      - "pass@1 >= 0.85 (85% threshold)"
      - "Greedy decoding (temperature=0) for reproducibility"

  pass_at_1_mbpp:
    formula: "pass@1_MBPP = count(correct) / count(total)"
    domain: "500 MBPP problems, test assertion validation"
    codomain: "[0, 1]"
    invariants:
      - "pass@1 >= 0.80 (80% threshold)"
      - "Function name extracted from test_list assertions"

  compound_gate:
    formula: "gate = (HE >= 0.85) AND (MBPP >= 0.80)"
    domain: "pass@1 scores from each benchmark"
    codomain: "bool"
    invariants:
      - "All benchmarks must pass independently"
      - "HumanEval+ (>=82%) deferred until EvalPlus integration"

proof_obligations:
  - type: bound
    property: "HumanEval pass@1 >= 85%"
    formal: "best_pass_at_1(humaneval_results) >= 0.85"
    tolerance: 0.0

  - type: bound
    property: "MBPP pass@1 >= 80%"
    formal: "best_pass_at_1(mbpp_results) >= 0.80"
    tolerance: 0.0

  - type: invariant
    property: "All benchmark gates pass simultaneously"
    formal: "HE >= 85% AND MBPP >= 80%"

falsification_tests:
  - id: FALSIFY-GATE-001
    rule: HumanEval gate
    prediction: "Best HumanEval pass@1 across all runs >= 85%"
    test: "scripts/validate-ac022.sh results/"
    if_fails: "Model does not meet minimum HumanEval threshold"
  - id: FALSIFY-GATE-002
    rule: MBPP gate
    prediction: "Best MBPP pass@1 across all runs >= 80%"
    test: "scripts/validate-ac022.sh results/"
    if_fails: "Model does not meet minimum MBPP threshold"
  - id: FALSIFY-GATE-003
    rule: No benchmark regression
    prediction: "Latest HumanEval result >= 80% (no catastrophic regression)"
    test: "jq '.results.pass_at_1' latest_humaneval_result.json >= 80.0"
    if_fails: "Recent eval shows regression from baseline"
