metadata:
  version: 1.0.0
  created: 2026-03-30
  author: PAIML
  description: >
    cuBLAS GEMM wrapper for QLoRA training — correct dimensions, no OOB,
    BF16 inputs with FP32 accumulation. Wraps cublasGemmEx for the universal
    dequant→cuBLAS pattern used by bitsandbytes, Unsloth, and torchtune.
  references:
    - "NVIDIA cuBLAS Documentation — cublasGemmEx"
    - "bitsandbytes/csrc/ops.cu:223-231 (reference C implementation)"
    - "Unsloth kernels/utils.py:1011 matmul_lora (cuBLAS via torch.matmul)"
  depends_on:
    - matmul-kernel-v1

equations:
  gemm_dimensions:
    formula: "C[m,n] = α · op(A)[m,k] @ op(B)[k,n] + β · C[m,n]"
    domain: "m,n,k ∈ ℕ⁺; A ∈ BF16^{m×k}; B ∈ BF16^{k×n}; α,β ∈ ℝ"
    codomain: "C ∈ BF16^{m×n}"
    invariants:
      - "lda >= max(1, rows(A)) for column-major layout"
      - "ldb >= max(1, rows(B)) for column-major layout"
      - "ldc >= max(1, m)"
      - "Transpose flags match actual memory layout"
    preconditions:
      - "A, B, C are valid device pointers"
      - "m, n, k > 0"

  cublas_naive_parity:
    formula: "|cuBLAS(A,B) - naive(A,B)|_max < ε"
    domain: "A ∈ BF16^{m×k}; B ∈ BF16^{k×n}"
    codomain: "ε ∈ ℝ⁺"
    invariants:
      - "ε < 1e-3 for BF16 inputs with FP32 accumulation"
      - "No NaN or Inf in output when inputs are finite"
      - "cuBLAS uses CUBLAS_COMPUTE_32F internally"

  addmm_fused_scaling:
    formula: "C = α · A @ B + β · C (single cuBLAS call with alpha/beta)"
    domain: "α,β ∈ ℝ; A,B,C ∈ BF16"
    codomain: "C ∈ BF16"
    invariants:
      - "alpha=0 => C = β·C_old (no multiply)"
      - "beta=0 => C = α·A@B (overwrite)"
      - "Fused scaling eliminates separate elementwise kernel launch"

falsification_tests:
  - id: FALSIFY-CUBLAS-001
    rule: Dimension correctness
    prediction: "cublasGemmEx with m=128, n=3584, k=3584 produces [128,3584] output"
    test: "Compare output shape and values against naive matmul"
    if_fails: "Leading dimension calculation incorrect or transpose flag wrong"
  - id: FALSIFY-CUBLAS-002
    rule: Transpose correctness
    prediction: "CUBLAS_OP_T produces same result as explicit transpose + CUBLAS_OP_N"
    test: "Compare both paths for random BF16 matrices"
    if_fails: "Row-major vs column-major confusion in lda/ldb"
  - id: FALSIFY-CUBLAS-003
    rule: Non-aligned dimensions
    prediction: "m=97, n=3584, k=3584 produces correct output (non-power-of-2 M)"
    test: "cuBLAS result matches naive for odd M values"
    if_fails: "Padding or alignment assumption violated"
  - id: FALSIFY-CUBLAS-004
    rule: alpha/beta semantics
    prediction: "alpha=2.0 doubles output; beta=1.0 adds to existing C"
    test: "Verify C_new = 2.0 * A @ B + 1.0 * C_old"
    if_fails: "alpha/beta pointer types or value passing incorrect"

kani_harnesses:
  - id: KANI-CUBLAS-001
    obligation: gemm_dimensions
    property: "lda >= max(1, rows(A)) for all valid dimension inputs"
    bound: "m,n,k in [1..64]"
    strategy: exhaustive
    solver: cadical
    harness: "cublas_leading_dim_correctness"
  - id: KANI-CUBLAS-002
    obligation: gemm_dimensions
    property: "Output buffer C has capacity >= m * n elements"
    bound: "m,n in [1..128]"
    strategy: exhaustive
    solver: cadical
    harness: "cublas_output_bounds"
