metadata:
  version: 1.0.0
  created: 2026-04-01
  author: PAIML
  description: >
    GPU-resident output normalization — eliminates CPU roundtrip for the final
    RMSNorm before lm_head projection. The hidden state stays on GPU from
    forward pass through lm_head GEMM, avoiding a 44-second download on GB10.
  references:
    - "Zhang & Sennrich (2019) Root Mean Square Layer Normalization"
    - "KAIZEN root cause: download_hidden blocks 44s waiting for forward GPU work"
  depends_on:
    - wgsl-gemm-tiled-v1

equations:
  rmsnorm_output:
    formula: "normed[i,j] = hidden[i,j] / sqrt(mean(hidden[i,:]²) + ε) * weight[j]"
    domain: "hidden ∈ ℝ^{seq×dim}, weight ∈ ℝ^dim, ε = 1e-6"
    codomain: "normed ∈ ℝ^{seq×dim}"
    invariants:
      - "Per-row normalization: each row normalized independently"
      - "Weight scaling: element-wise multiplication with learned weight"
      - "Epsilon prevents division by zero for zero-norm rows"

proof_obligations:
  - type: equivalence
    property: "GPU RMSNorm matches CPU reference within ε < 1e-4"
    formal: "|normed_gpu[i,j] - normed_cpu[i,j]| < 1e-4 for all i,j"
    tolerance: 1e-4

  - type: invariant
    property: "Hidden state never leaves GPU between forward and lm_head"
    formal: "count(download_hidden() in forward→lm_head path) = 0"

  - type: bound
    property: "Norm weights uploaded once at init, not per step"
    formal: "upload_count(norm_weights) = 1 across N training steps"

falsification_tests:
  - id: FALSIFY-GPU-NORM-001
    rule: "GPU RMSNorm matches CPU reference"
    prediction: "max |gpu - cpu| < 1e-4"
    if_fails: "GPU RMSNorm kernel diverges from CPU implementation"
  - id: FALSIFY-GPU-NORM-002
    rule: "No CPU download in forward-to-lm_head path"
    prediction: "Zero download_hidden() calls in forward→lm_head path"
    if_fails: "GPU-resident pipeline broken, hidden state downloaded to CPU"
  - id: FALSIFY-GPU-NORM-003
    rule: "Normed output has correct scale"
    prediction: "||normed[i,:]||² / dim within weight scaling"
    if_fails: "RMSNorm weight scaling applied incorrectly"
