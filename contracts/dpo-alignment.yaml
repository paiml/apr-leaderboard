metadata:
  version: 1.0.0
  created: '2026-04-03'
  author: PAIML Engineering
  description: >
    Direct Preference Optimization (DPO) — trains model to prefer chosen
    responses over rejected ones without a reward model.
  references:
    - "Rafailov et al. (2023) DPO"

equations:
  dpo_loss:
    formula: "L = -log σ(β * (log π_θ(y_w|x)/π_ref(y_w|x) - log π_θ(y_l|x)/π_ref(y_l|x)))"
    domain: "preference pairs (x, y_w, y_l), β > 0"
    codomain: "L ∈ ℝ≥0"
    lean_theorem: ProvableContracts.DPO.dpo_loss_nonneg

  dpo_gradient:
    formula: "∇L = -β * σ(-β*Δ) * (∇log π_θ(y_w|x) - ∇log π_θ(y_l|x))"
    lean_theorem: ProvableContracts.DPO.dpo_gradient_formula

proof_obligations:
  - type: bound
    property: "DPO loss is non-negative for all inputs"
    formal: "L_dpo(x, y_w, y_l, β) >= 0 for all valid (x, y_w, y_l) and β > 0"
    lean_theorem: ProvableContracts.DPO.dpo_loss_nonneg

  - type: monotonicity
    property: "Higher preference margin yields lower loss"
    formal: "Δ_1 > Δ_2 implies L_dpo(Δ_1) < L_dpo(Δ_2)"
    lean_theorem: ProvableContracts.DPO.dpo_gradient_formula

  - type: convergence
    property: "DPO training reduces loss over 3 epochs"
    formal: "avg_loss(epoch_3) < avg_loss(epoch_1)"

falsification_tests:
  FALSIFY-DPO-001:
    obligation: loss_nonneg
    method: "Compute DPO loss on random pairs, verify >= 0"
  FALSIFY-DPO-002:
    obligation: dpo_loss
    method: "Train 3 epochs, verify loss decreases"
