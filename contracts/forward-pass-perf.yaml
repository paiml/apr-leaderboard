metadata:
  version: 1.0.0
  created: 2026-04-01
  author: PAIML
  description: >
    Forward pass performance characterization — per-operation GPU timing within
    a single transformer layer. Identifies which operations dominate the 1.7s/layer.
  references:
    - "KAIZEN: 28 layers × 1.7s = 47s forward pass, 140 GFLOPS (37% of 375 peak)"

equations:
  per_layer_time:
    formula: "t_layer = Σ t_op for op ∈ {qkv_proj, attn, ffn, rmsnorm, lora}"
    domain: "t_op > 0 for all operations"
    codomain: "t_layer ∈ ℝ⁺ (seconds)"
    invariants:
      - "t_layer >= total_flops / peak_gflops (arithmetic bound)"
      - "Σ t_op = t_layer (no unaccounted time)"

  forward_total:
    formula: "t_fwd = n_layers × t_layer + t_embed + t_lm_head"
    domain: "n_layers ∈ ℕ⁺ (28 for 7B)"
    codomain: "t_fwd ∈ ℝ⁺ (seconds)"
    invariants:
      - "t_fwd < n_layers × 2 × t_layer (overhead < 100%)"

proof_obligations:
  - type: bound
    property: "Forward pass time bounded by arithmetic intensity"
    formal: "t_layer >= total_flops / peak_gflops"

  - type: dominance
    property: "Top operation accounts for >= 50% of per-layer time"
    formal: "max(t_op) / t_layer >= 0.5"

falsification_tests:
  FALSIFY-PERF-001:
    obligation: bottleneck_identified
    method: "Per-operation timing within encode_forward_layer_training on first layer"
    pass_criterion: "Report shows which operation takes most time"
