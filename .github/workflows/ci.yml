name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mdBook
        run: |
          mkdir -p $HOME/bin
          curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.4.40/mdbook-v0.4.40-x86_64-unknown-linux-gnu.tar.gz | tar -xz -C $HOME/bin
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Check file sizes (500-line limit)
        run: |
          echo "=== File size check (pmat 500-line limit) ==="
          OVER=0
          for f in scripts/*.sh Makefile docs/specifications/components/*.md; do
            [ -f "$f" ] || continue
            LINES=$(wc -l < "$f")
            if [ "$LINES" -gt 500 ]; then
              echo "FAIL: $f ($LINES lines > 500)"
              OVER=1
            fi
          done
          [ "$OVER" -eq 0 ] && echo "All files under 500 lines" || exit 1

      - name: Validate shell scripts (bash -n)
        run: |
          echo "=== Shell script syntax check ==="
          for f in scripts/*.sh; do
            printf "  %-50s" "$f"
            bash -n "$f" && echo "OK" || { echo "FAIL"; exit 1; }
          done

      - name: Build mdBook
        run: cd docs && mdbook build

      - name: Validate YAML configs
        run: |
          pip install pyyaml --quiet
          echo "=== YAML config validation ==="
          FAIL=0
          for f in configs/models/*.yaml configs/recipes/*.yaml configs/eval/*.yaml configs/pipeline/*.yaml contracts/*.yaml data_catalog.yaml; do
            [ -f "$f" ] || continue
            printf "  %-50s" "$f"
            if python3 -c "import yaml; yaml.safe_load(open('$f'))" 2>/dev/null; then
              echo "valid"
            else
              echo "INVALID"
              FAIL=1
            fi
          done
          [ "$FAIL" -eq 0 ] || exit 1

      - name: Run pass@k falsification tests
        run: |
          echo "=== pass@k Contract Falsification Tests ==="
          FAIL=0
          # FT-001: zero correct = 0
          r=$(awk 'BEGIN{n=10;c=0;k=1; if(c==0){print 0; exit}}')
          [ "$(echo "$r == 0" | bc)" -eq 1 ] && echo "  FT-001 (zero=0): PASS" || { echo "  FT-001: FAIL ($r)"; FAIL=1; }
          # FT-002: all correct = 1
          r=$(awk 'BEGIN{n=10;c=10;k=1; if(n-c<k){print 1; exit}}')
          [ "$(echo "$r == 1" | bc)" -eq 1 ] && echo "  FT-002 (all=1): PASS" || { echo "  FT-002: FAIL ($r)"; FAIL=1; }
          # FT-003: pass@1 = c/n = 0.5
          r=$(awk 'BEGIN{n=10;c=5;k=1; lr=0; for(i=0;i<k;i++){lr+=log(n-c-i)-log(n-i)} printf "%.1f",1-exp(lr)}')
          [ "$(echo "$r == 0.5" | bc)" -eq 1 ] && echo "  FT-003 (ratio=0.5): PASS" || { echo "  FT-003: FAIL ($r)"; FAIL=1; }
          [ "$FAIL" -eq 0 ] || exit 1

      - name: Validate contract structure
        run: |
          echo "=== Contract structure validation ==="
          FAIL=0
          for f in contracts/*.yaml; do
            [ -f "$f" ] || continue
            printf "  %-50s" "$f"
            # Every contract must have metadata, equations, proof_obligations, falsification_tests
            MISSING=""
            for key in metadata equations proof_obligations falsification_tests; do
              if ! python3 -c "import yaml; d=yaml.safe_load(open('$f')); assert '$key' in d" 2>/dev/null; then
                MISSING="$MISSING $key"
              fi
            done
            if [ -z "$MISSING" ]; then
              echo "valid"
            else
              echo "MISSING:$MISSING"
              FAIL=1
            fi
          done
          [ "$FAIL" -eq 0 ] || exit 1

      - name: Check spec component coverage
        run: |
          echo "=== Spec component coverage ==="
          FAIL=0
          for f in docs/specifications/components/*.md; do
            base=$(basename "$f" .md)
            if ! grep -q "$base" docs/src/SUMMARY.md; then
              echo "MISSING from SUMMARY.md: $base"
              FAIL=1
            fi
          done
          [ "$FAIL" -eq 0 ] && echo "All spec components referenced in SUMMARY.md" || exit 1
