name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mdBook
        run: |
          mkdir -p $HOME/bin
          curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.4.40/mdbook-v0.4.40-x86_64-unknown-linux-gnu.tar.gz | tar -xz -C $HOME/bin
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Check file sizes (500-line limit)
        run: |
          echo "=== File size check (pmat 500-line limit) ==="
          OVER=0
          for f in scripts/*.sh Makefile docs/specifications/components/*.md; do
            [ -f "$f" ] || continue
            LINES=$(wc -l < "$f")
            if [ "$LINES" -gt 500 ]; then
              echo "FAIL: $f ($LINES lines > 500)"
              OVER=1
            fi
          done
          [ "$OVER" -eq 0 ] && echo "All files under 500 lines" || exit 1

      - name: Validate shell scripts (bash -n)
        run: |
          echo "=== Shell script syntax check ==="
          for f in scripts/*.sh; do
            printf "  %-50s" "$f"
            bash -n "$f" && echo "OK" || { echo "FAIL"; exit 1; }
          done

      - name: Build mdBook
        run: cd docs && mdbook build

      - name: Validate YAML configs
        run: |
          pip install pyyaml --quiet
          echo "=== YAML config validation ==="
          FAIL=0
          for f in configs/models/*.yaml configs/recipes/*.yaml configs/eval/*.yaml configs/pipeline/*.yaml contracts/*.yaml data_catalog.yaml; do
            [ -f "$f" ] || continue
            printf "  %-50s" "$f"
            if python3 -c "import yaml; yaml.safe_load(open('$f'))" 2>/dev/null; then
              echo "valid"
            else
              echo "INVALID"
              FAIL=1
            fi
          done
          [ "$FAIL" -eq 0 ] || exit 1

      - name: Validate contract structure
        run: |
          echo "=== Contract structure validation ==="
          FAIL=0
          for f in contracts/*.yaml; do
            [ -f "$f" ] || continue
            printf "  %-50s" "$f"
            # Every contract must have metadata, equations, proof_obligations, falsification_tests
            MISSING=""
            for key in metadata equations proof_obligations falsification_tests; do
              if ! python3 -c "import yaml; d=yaml.safe_load(open('$f')); assert '$key' in d" 2>/dev/null; then
                MISSING="$MISSING $key"
              fi
            done
            if [ -z "$MISSING" ]; then
              echo "valid"
            else
              echo "MISSING:$MISSING"
              FAIL=1
            fi
          done
          [ "$FAIL" -eq 0 ] || exit 1
