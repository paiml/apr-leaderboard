# Data Catalog — Sovereign Data Governance
# Classification: Internal/Research
# Lifecycle: Retained for reproducibility

datasets:
  instruct-corpus:
    purpose: "Instruction/response pairs for LoRA fine-tuning"
    classification: internal
    format: jsonl
    location: data/instruct-corpus.jsonl
    records: 15500
    sources:
      - depyler ground truth corpus
      - hf-gtc ground truth corpus
      - jax-gtc ground truth corpus
      - vllm-gtc ground truth corpus
    lifecycle: retained
    contract: contracts/lora-finetune-eval.yaml

  wgpu-proof-subset:
    purpose: "200-sample subset for wgpu training proof"
    classification: internal
    format: jsonl
    location: data/wgpu-proof-subset.jsonl
    records: 200
    lifecycle: ephemeral

  code-instruct:
    purpose: "Code instruction data for general fine-tuning"
    classification: internal
    format: jsonl
    location: data/code-instruct.jsonl
    lifecycle: retained

  reasoning-preferences:
    purpose: "DPO preference pairs for reasoning alignment"
    classification: internal
    format: jsonl
    location: data/reasoning-preferences.jsonl
    lifecycle: retained
    contract: contracts/dpo-alignment.yaml

  distill-prompts:
    purpose: "99 targeted coding prompts for 32B teacher distillation (PMAT-007)"
    classification: internal
    format: jsonl
    location: data/distill/distill-prompts.jsonl
    records: 99
    categories: 11
    sources:
      - "HumanEval failure analysis (25 failed problems → 11 categories)"
    lifecycle: retained
    generate: "scripts/generate-distill-prompts.sh"
    contract: contracts/distillation.yaml

  teacher-completions:
    purpose: "32B teacher model completions for text-based distillation (PMAT-007)"
    classification: internal
    format: jsonl
    location: data/distill/teacher-completions.jsonl
    sources:
      - "apr run --batch-jsonl on 32B teacher (temperature=0.8)"
    lifecycle: retained
    generate: "make distill-generate"
    contract: contracts/distillation.yaml

  combined-training:
    purpose: "Merged teacher completions + instruct corpus for QLoRA (PMAT-008)"
    classification: internal
    format: jsonl
    location: data/combined-training.jsonl
    sources:
      - "data/distill/teacher-completions.jsonl"
      - "data/instruct-corpus.jsonl"
    lifecycle: ephemeral
    generate: "make combine-training-data"

  calibration:
    purpose: "128 random code samples for Wanda/SparseGPT pruning calibration (PMAT-011)"
    classification: internal
    format: jsonl
    location: data/calibration.jsonl
    records: 128
    sources:
      - "Random sample from instruct-corpus.jsonl (seed=42)"
    lifecycle: retained
    generate: "make prepare-calibration-data"
    contract: contracts/quantization.yaml

  preference-pairs:
    purpose: "DPO preference pairs from N-sampling eval results (PMAT-014)"
    classification: internal
    format: jsonl
    location: data/preference-pairs.jsonl
    sources:
      - "N-sampling eval (NUM_SAMPLES=10, TEMPERATURE=0.8)"
    lifecycle: retained
    generate: "make generate-preference-pairs"
    contract: contracts/preference-pairs.yaml

external_datasets:
  bigcode-starcoderdata:
    purpose: "StarCoder training data (code fine-tuning source)"
    provider: "bigcode/starcoderdata"
    platform: huggingface
    license: "Apache-2.0"

benchmarks:
  humaneval:
    purpose: "OpenAI HumanEval evaluation benchmark"
    provider: "openai/human-eval"
    problems: 164
    local: data/benchmarks/humaneval.jsonl
    download: "make benchmark-download"
    contract: contracts/pass-at-k.yaml
  mbpp:
    purpose: "Mostly Basic Python Problems benchmark"
    provider: "google-research/mbpp"
    problems: 974
    local: data/benchmarks/mbpp.jsonl
    download: "make benchmark-download"
    contract: contracts/pass-at-k.yaml
  bigcodebench:
    purpose: "BigCodeBench practical coding evaluation"
    provider: "bigcode/bigcodebench"
    problems: 1140
    local: data/benchmarks/bigcodebench.jsonl
    download: "make benchmark-download"
    contract: contracts/leaderboard-gate.yaml

data_lineage:
  raw_source: "Ground truth corpora (depyler, hf-gtc, jax-gtc, vllm-gtc)"
  extraction: "apr data prep -> Python AST parsing -> instruction/response pairs"
  distillation: "32B teacher -> apr run --batch-jsonl -> teacher completions -> combine with instruct corpus"
  calibration: "Random 128-sample subset from instruct corpus (seed=42)"
  training: "apr finetune -> LoRA/QLoRA adapters -> .apr checkpoint"
  alignment: "N-sampling eval -> preference pairs -> apr finetune --method dpo"
  evaluation: "scripts/eval-pass-at-k.sh -> apr run -> sandbox execution -> scoring"
  submission: "scripts/submit.sh -> apr export -> apr publish -> HuggingFace Hub"
