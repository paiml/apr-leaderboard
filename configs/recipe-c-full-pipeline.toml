# Recipe C: "The Full Pipeline" — every technique stacked.
#
# Matches spec §9.3: distill → finetune → merge → prune → quantize → eval
#
# Usage:
#   apr-leaderboard pipeline --config configs/recipe-c-full-pipeline.toml

model_id = "Qwen/Qwen2.5-Coder-7B"
output_dir = "models"
quantization = "fp16"
submit = false
leaderboard = "bigcode"

benchmarks = [
    "humaneval",
    "humaneval-plus",
    "mbpp",
    "mbpp-plus",
    "bigcodebench",
]

[distill]
teacher = "models/teacher-32b.apr"
strategy = "progressive"
temperature = 3.0
alpha = 0.7

[finetune]
dataset = "data/code-instruct-50k.jsonl"
rank = 32
lr = 2e-4
epochs = 5

[merge]
models = ["models/reasoning-variant.apr"]
strategy = "ties"

[prune]
method = "wanda"
target_ratio = 0.2

[quantize]
scheme = "int4"
