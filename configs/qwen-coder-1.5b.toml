# Pipeline config for Qwen2.5-Coder-1.5B — sovereign binary target (§4 Tier 3).
#
# Strategy: QLoRA → aggressive prune → INT4 quantize → compile to static binary.
# Goal: <1GB standalone binary that generates valid Python code.
# See also: recipe-d-sovereign-binary.toml for the recipe pattern.
#
# Usage:
#   apr-leaderboard pipeline --config configs/qwen-coder-1.5b.toml

model_id = "Qwen/Qwen2.5-Coder-1.5B"
output_dir = "models"
quantization = "fp16"
submit = false
leaderboard = "bigcode"

benchmarks = [
    "humaneval",
    "humaneval-plus",
    "mbpp",
    "mbpp-plus",
]

[finetune]
dataset = "data/code-instruct.jsonl"
method = "qlora"
rank = 16
lr = 1e-4
epochs = 3

[prune]
method = "magnitude"
target_ratio = 0.4

[quantize]
scheme = "int4"

[compile]
release = true
lto = true
output = "qwen-coder-1.5b"
