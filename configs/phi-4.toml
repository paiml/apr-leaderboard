# Pipeline config for Phi-4 — architecture diversity target (§4 Tier 2).
#
# Strategy: LoRA finetune → eval across full benchmark suite.
# Focus: Architecture diversity, 14B parameter sweet spot.
#
# Usage:
#   apr-leaderboard pipeline --config configs/phi-4.toml

model_id = "microsoft/phi-4"
output_dir = "models"
quantization = "fp16"
submit = false
leaderboard = "open-llm-leaderboard"

benchmarks = [
    "humaneval",
    "humaneval-plus",
    "mbpp",
    "mbpp-plus",
    "bigcodebench",
    "multipl-e",
    "crux-eval",
]

[finetune]
dataset = "data/code-instruct.jsonl"
method = "lora"
rank = 32
lr = 2e-4
epochs = 5

[quantize]
scheme = "int8"
