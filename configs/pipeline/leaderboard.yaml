# configs/pipeline/leaderboard.yaml — Forjar infrastructure manifest
#
# Single YAML that describes infrastructure for the leaderboard pipeline.
# Forjar resolves dependencies, tracks state, dispatches across machines.
#
# Hardware: Mac Pro (2019) with dual AMD Radeon Pro W5700X (Navi10)
#   GPU0: renderD128, Vulkan 1.3.255, RADV NAVI10
#   GPU1: renderD129, Vulkan 1.3.255, RADV NAVI10
#   Both GPUs available via wgpu (Vulkan backend, Mesa RADV driver)
#
# Usage:
#   apr pipeline plan configs/pipeline/leaderboard.yaml
#   apr pipeline apply configs/pipeline/leaderboard.yaml
#   apr pipeline status
#   apr pipeline drift

version: "1.0"
name: apr-leaderboard-pipeline
description: "Coding leaderboard evaluation + model optimization pipeline (dual wgpu GPU)"

machines:
  lambda:
    hostname: lambda
    addr: 127.0.0.1
    user: noah
    arch: x86_64
    roles: [gpu-train, eval, inference]

resources:
  # Infrastructure — Dual AMD Radeon Pro W5700X via wgpu/Vulkan
  gpu-0:
    type: gpu
    machine: lambda
    gpu_backend: wgpu                           # Vulkan — no CUDA toolkit
    device: "/dev/dri/renderD128"
    vendor: amd
    model: "Radeon Pro W5700X (Navi10)"
    vram_gb: 16
    vulkan_version: "1.3.255"
    driver: "radv (Mesa 23.2.1)"

  gpu-1:
    type: gpu
    machine: lambda
    gpu_backend: wgpu
    device: "/dev/dri/renderD129"
    vendor: amd
    model: "Radeon Pro W5700X (Navi10)"
    vram_gb: 16
    vulkan_version: "1.3.255"
    driver: "radv (Mesa 23.2.1)"

  vulkan-driver:
    type: package
    machine: lambda
    provider: apt
    state: present
    packages: [mesa-vulkan-drivers, vulkan-tools, libvulkan-dev]
    depends_on: [gpu-0, gpu-1]

  data-dir:
    type: file
    machine: lambda
    path: /home/noah/src/apr-leaderboard/data
    state: directory
    mode: "0755"

  checkpoints-dir:
    type: file
    machine: lambda
    path: /home/noah/src/apr-leaderboard/checkpoints
    state: directory
    mode: "0755"

  results-dir:
    type: file
    machine: lambda
    path: /home/noah/src/apr-leaderboard/results
    state: directory
    mode: "0755"

  # Tools
  apr-cli:
    type: package
    machine: lambda
    provider: cargo
    state: present
    packages: [aprender]
    min_version: "0.4.10"

  bashrs:
    type: package
    machine: lambda
    provider: cargo
    state: present
    packages: [bashrs]

  # Data preparation
  prep-instruct-data:
    type: task
    machine: lambda
    command: >
      apr data audit data/instruct-corpus.jsonl --verbose
    output_artifacts: ["data/instruct-corpus.jsonl"]
    depends_on: [data-dir, apr-cli]

policy:
  failure: stop_on_first
  parallel_machines: false
  retry: 1

gpu_policy:
  default_device: 0                             # GPU0 for single-GPU workloads
  parallel_training: true                       # Enable dual-GPU parallel pipelines
  # GPU0: primary training/inference
  # GPU1: concurrent eval, second pipeline, or data-parallel training
  assignment:
    train: [0]                                  # Training on GPU0 by default
    eval: [1]                                   # Eval on GPU1 (parallel with training)
    inference: [0, 1]                           # Load-balance inference across both
