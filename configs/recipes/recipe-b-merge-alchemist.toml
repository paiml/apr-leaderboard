# Recipe B: "The Merge Alchemist" — zero training compute.
#
# Matches spec §9.2: import → TIES merge → structured prune → quantize → eval
# No GPU training. Pure weight manipulation for best score.
#
# Usage:
#   make pipeline RECIPE=recipe-b-merge-alchemist

model_id = "Qwen/Qwen2.5-Coder-7B-Instruct"
output_dir = "checkpoints"
quantization = "fp16"
submit = false
leaderboard = "bigcode"

benchmarks = [
    "humaneval",
    "humaneval-plus",
    "mbpp",
]

[merge]
models = ["checkpoints/reasoning-variant.apr"]
strategy = "ties"
base_model = "checkpoints/qwen_qwen2.5-coder-7b.apr"
density = 0.2

[prune]
method = "structured"
target_ratio = 0.15

[quantize]
scheme = "q4k"
