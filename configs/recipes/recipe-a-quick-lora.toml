# Recipe A: "Quick LoRA" — fast iteration with a single LoRA pass.
#
# Matches spec §9.1: import → LoRA finetune → eval
#
# Usage:
#   make pipeline RECIPE=recipe-a-quick-lora

model_id = "Qwen/Qwen2.5-Coder-7B-Instruct"
output_dir = "checkpoints"
quantization = "fp16"
submit = false
leaderboard = "bigcode"

benchmarks = [
    "humaneval",
    "mbpp",
]

[finetune]
dataset = "data/code-instruct.jsonl"
rank = 16
lr = 1e-4
epochs = 3
