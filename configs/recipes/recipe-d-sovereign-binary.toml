# Recipe D: "Sovereign Binary" — ship the model as a Rust binary.
#
# Matches spec §9.4: import → qlora finetune → magnitude prune → int4 quantize → eval
# Target: single static binary, no runtime deps, no Python, no Docker.
#
# Usage:
#   make pipeline RECIPE=recipe-d-sovereign-binary

model_id = "Qwen/Qwen2.5-Coder-1.5B"
output_dir = "checkpoints"
quantization = "fp16"
submit = false
leaderboard = "bigcode"

benchmarks = [
    "humaneval",
    "mbpp",
]

[finetune]
dataset = "data/instruct.jsonl"
method = "qlora"
rank = 16
lr = 1e-4
epochs = 3

[prune]
method = "magnitude"
target_ratio = 0.4

[quantize]
scheme = "int4"

[compile]
release = true
lto = true
output = "qwen-coder"
