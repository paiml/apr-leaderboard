# Recipe E: "Instruct LoRA" — finetune on ground truth corpora for BigCodeBench.
#
# Pipeline: import (Q4K) → prep-data → finetune (instruct) → eval
#
# Uses 15.5K instruction/response pairs extracted from depyler, hf-gtc,
# jax-gtc, and vllm-gtc ground truth corpora via AST parsing.
#
# Usage:
#   make pipeline RECIPE=recipe-e-instruct-finetune
#
# Manual steps:
#   make import MODEL=Qwen/Qwen2.5-Coder-7B-Instruct QUANTIZE=q4k
#   make prep-data
#   make finetune-instruct MODEL_SIZE=7B RANK=16 EPOCHS=3
#   make eval-humaneval CHECKPOINT=checkpoints/qwen2.5-coder-7b-instruct-q4k.apr
#   make eval-bigcodebench CHECKPOINT=checkpoints/qwen2.5-coder-7b-instruct-q4k.apr

model_id = "Qwen/Qwen2.5-Coder-7B-Instruct"
output_dir = "checkpoints"
quantization = "q4k"
submit = false
leaderboard = "bigcode"

benchmarks = [
    "humaneval",
    "bigcodebench",
]

[finetune]
task = "instruct"
dataset = "data/instruct-corpus.jsonl"
rank = 16
lr = 2e-4
epochs = 3
model_size = "7B"
