# Recipe G: "wgpu Proof" — Prove wgpu GPU training works end-to-end.
#
# Pipeline: import (Q4K GGUF) → finetune (QLoRA via wgpu) → eval → verify
#
# This is a deliberately small, fast recipe designed to prove one thing:
# training on ANY GPU via wgpu (Vulkan/Metal/DX12) produces a model with
# decreasing loss and non-degraded eval scores.
#
# Uses Qwen2.5-Coder-1.5B (smallest competitive model) for fast turnaround.
# Training data: 200 samples from instruct corpus (subset for speed).
# Expected wall-clock: <30 min on any 8+ GB GPU.
#
# Success criteria:
#   1. Training completes without GPU errors
#   2. Loss decreases over epochs
#   3. `apr run --gpu` produces valid code output
#   4. Verbose output shows wgpu adapter (not CUDA)
#
# Usage:
#   make prove-wgpu                    # full proof (import + train + eval + verify)
#   make pipeline RECIPE=recipe-g-wgpu-proof  # just the pipeline
#   make pipeline-plan RECIPE=recipe-g-wgpu-proof  # dry-run
#
# Parallel usage (kick off and continue other work):
#   make prove-wgpu 2>&1 | tee results/wgpu-proof.log &

model_id = "Qwen/Qwen2.5-Coder-1.5B-Instruct"
output_dir = "checkpoints"
quantization = "q4k"
submit = false
leaderboard = "bigcode"

benchmarks = [
    "humaneval",
]

[finetune]
method = "qlora"
task = "classify"
dataset = "data/wgpu-proof-subset.jsonl"
rank = 8
lr = 2e-4
epochs = 2
model_size = "1.5B"
vram = 8.0
