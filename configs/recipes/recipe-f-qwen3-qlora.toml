# Recipe F: "Qwen3 QLoRA" — QLoRA fine-tune Qwen3-8B on instruct corpus.
#
# Pipeline: import (FP16) → finetune (QLoRA + NF4) → eval
#
# QLoRA freezes NF4-quantized base weights and trains rank-16 LoRA adapters
# in FP16. Total VRAM ~4.5 GB — fits 3x within 24 GB GPU budget.
#
# Uses the same 15.5K instruct corpus as recipe-e (depyler, hf-gtc,
# jax-gtc, vllm-gtc ground truth corpora).
#
# Recommended workflow:
#   1. Import base model:     make import MODEL=Qwen/Qwen3-8B
#   2. Run baseline eval:     make eval-humaneval CHECKPOINT=checkpoints/qwen_qwen3-8b.apr
#   3. Run QLoRA pipeline:    make pipeline RECIPE=recipe-f-qwen3-qlora
#   4. Compare pre/post eval results
#
# Usage:
#   make pipeline RECIPE=recipe-f-qwen3-qlora
#   make pipeline-plan RECIPE=recipe-f-qwen3-qlora

model_id = "Qwen/Qwen3-8B"
output_dir = "checkpoints"
quantization = "fp16"
submit = false
leaderboard = "bigcode"

benchmarks = [
    "humaneval",
    "bigcodebench",
]

[finetune]
method = "qlora"
task = "instruct"
dataset = "data/instruct-corpus.jsonl"
rank = 16
lr = 2e-4
epochs = 3
model_size = "8B"
quantize_nf4 = true
max_seq_len = 512
vram = 8.0
