# configs/eval/coding-benchmarks.yaml — Coding benchmark evaluation suite
#
# Defines all benchmarks, their parameters, and pass/fail thresholds.
# Used by the batuta playbook and `apr eval` to run standardized evaluations.
#
# Usage:
#   apr eval apply --suite configs/eval/coding-benchmarks.yaml --model checkpoints/model.apr

version: "1.0"
name: coding-benchmarks
description: "Coding benchmark suite for leaderboard evaluation"

defaults:
  max_tokens: 512
  temperature: 0.0
  num_samples: 1
  prompt_strategy: standard                   # standard, scot, few-shot, cgo
  timeout: 300                                # Per-problem timeout (seconds)

tasks:
  humaneval:
    type: code_generation
    metric: pass@1
    n_samples: 164
    temperature: 0.0
    max_tokens: 512
    stop_tokens: ["\nclass ", "\ndef ", "\n#", "\nif __name__"]
    description: "OpenAI HumanEval — 164 Python problems"

  humaneval-plus:
    type: code_generation
    metric: pass@1
    n_samples: 164
    temperature: 0.0
    max_tokens: 512
    stop_tokens: ["\nclass ", "\ndef ", "\n#", "\nif __name__"]
    description: "EvalPlus HumanEval+ — augmented test cases"

  humaneval-fim:
    type: fill_in_middle
    metric: pass@1
    n_samples: 164
    temperature: 0.0
    max_tokens: 256
    description: "HumanEval FIM — fill-in-the-middle variant"

  mbpp:
    type: code_generation
    metric: pass@1
    n_samples: 974                                   # Full dataset (test split: task_ids 11-510 = 500)
    temperature: 0.0
    max_tokens: 512
    description: "Mostly Basic Python Problems — 974 problems (full dataset)"

  mbpp-plus:
    type: code_generation
    metric: pass@1
    n_samples: 500
    temperature: 0.0
    max_tokens: 512
    description: "EvalPlus MBPP+ — augmented test cases"

  bigcodebench:
    type: code_generation
    metric: pass@1
    n_samples: 1140
    temperature: 0.0
    max_tokens: 1024
    description: "BigCodeBench — practical coding tasks with library usage"

  livecodebench:
    type: code_generation
    metric: pass@1
    n_samples: 500                                       # ~500 problems (rolling dataset)
    temperature: 0.0
    max_tokens: 2048
    decontamination: time_based                          # Exclude problems published within 90 days
    description: "LiveCodeBench — competitive programming (contamination-free)"

  multipl-e:
    type: code_generation
    metric: pass@1
    languages: [python, rust, javascript, typescript, go, java, cpp]
    temperature: 0.0
    max_tokens: 512
    description: "MultiPL-E — multilingual code generation"

  crux-eval:
    type: code_reasoning
    metric: accuracy
    temperature: 0.0
    max_tokens: 256
    description: "CRUXEval — code reasoning and understanding"

# Targets: minimum scores per pipeline stage
targets:
  base:
    humaneval: 0.30
    mbpp: 0.35
  finetuned:
    humaneval: 0.50
    mbpp: 0.55
    bigcodebench: 0.20
  optimized:
    humaneval: 0.45
    mbpp: 0.50

# Baselines: known scores for comparison
baselines:
  "Qwen/Qwen2.5-Coder-7B-Instruct":
    humaneval: 0.878
    mbpp: 0.804
    bigcodebench: 0.411
  "Qwen/Qwen2.5-Coder-1.5B":
    humaneval: 0.439
    mbpp: 0.498
  "Qwen/Qwen2.5-Coder-1.5B-Instruct":
    humaneval: 0.676
    mbpp: 0.698
  "Qwen/Qwen2.5-Coder-32B-Instruct":
    humaneval: 0.925
    mbpp: 0.845
    bigcodebench: 0.519
  "Qwen/Qwen3-8B":
    humaneval: 0.720
    mbpp: 0.650

# apr-native baselines (measured via apr run + eval-pass-at-k.sh)
apr_baselines:
  "qwen2.5-coder-32b-instruct-q4km":
    humaneval: 0.9085
    notes: "Q4K_M GGUF import, CPU batch (gx10), greedy, max_tokens=512. Previous GPU run: 89.63%."
  "qwen2.5-coder-7b-instruct-q4k":
    humaneval: 0.8537
    humaneval_fewshot: 0.8720
    humaneval_scot: 0.8232
    mbpp: 0.7620
    notes: "Q4K GGUF import, CPU/GPU parity verified, greedy, max_tokens=512. Few-shot best strategy."
  "qwen3-4b-q4k":
    humaneval: 0.7805
    notes: "Q4K GGUF import, CPU, thinking mode (4096 tokens), 4 timeouts"
  "qwen2.5-coder-1.5b-q4k":
    humaneval: 0.5915
    notes: "Q4K GGUF import, CPU, greedy, max_tokens=512"

# Oracle analysis (multi-run upper bound, measured 2026-03-28)
oracle:
  "qwen2.5-coder-7b-instruct-q4k":
    humaneval: 0.9634                                    # 158/164 across all runs × strategies
    always_fail: 6                                       # max_fill, maximum, intersection, tri, order_by_points, generate_integers
    inconsistent: 39
    always_pass: 119

# Prompt strategies (§5.6)
prompt_strategies:
  standard:
    description: "Vanilla completion — task description + code prompt"
    best_for: [humaneval, mbpp]
    stop_tokens: ["\nclass ", "\ndef ", "\n#", "\nif __name__"]
  few-shot:
    description: "In-context examples (trivial add(a,b) exemplar)"
    best_for: [humaneval]
    exemplar_count: 1
    notes: "Best 7B HumanEval strategy (+1.83pp). Hurts MBPP and 32B."
  scot:
    description: "Structured chain-of-thought reasoning before code"
    best_for: []
    notes: "Hurts ≤7B models (-3.05pp). May help ≥32B."
  cgo:
    description: "Code-guided optimization — use helper functions"
    best_for: []
    notes: "83.54% on HumanEval. 1 unique win (is_nested)."
