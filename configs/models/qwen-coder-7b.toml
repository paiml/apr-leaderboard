# Pipeline config for Qwen2.5-Coder-7B leaderboard evaluation.
#
# Usage:
#   make pipeline RECIPE=recipe-a-quick-lora
#   make import MODEL=Qwen/Qwen2.5-Coder-7B

model_id = "Qwen/Qwen2.5-Coder-7B"
output_dir = "checkpoints"
quantization = "fp16"
submit = false
leaderboard = "bigcode"

benchmarks = [
    "humaneval",
    "humaneval-plus",
    "mbpp",
    "mbpp-plus",
    "bigcodebench",
    "multipl-e",
]

[finetune]
dataset = "bigcode/starcoderdata"
rank = 16
lr = 1e-4
epochs = 3
