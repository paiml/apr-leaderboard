# Pipeline config for Qwen3-8B QLoRA fine-tuning on coding benchmarks.
#
# Base model (not Instruct) — QLoRA on base + instruct data avoids
# double-instruction-tuning and gives cleaner signal.
#
# Usage:
#   make pipeline RECIPE=recipe-f-qwen3-qlora
#   make import MODEL=Qwen/Qwen3-8B

model_id = "Qwen/Qwen3-8B"
output_dir = "checkpoints"
quantization = "fp16"
submit = false
leaderboard = "bigcode"

benchmarks = [
    "humaneval",
    "bigcodebench",
]

[finetune]
method = "qlora"
dataset = "data/instruct-corpus.jsonl"
rank = 16
lr = 2e-4
epochs = 3
